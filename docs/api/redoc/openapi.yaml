openapi: 3.0.3
info:
  title: Leaftask API
  version: 1.0.0
  description: |
    Leaftask API documentation for managing tasks and projects.
  contact:
    name: David Vázquez Rivas
    email: vazquezrivasdavid@gmail.com

servers:
  - url: http://localhost:3000/api/v1
    description: Local Development Environment

security:
  - BearerAuth: []

x-tagGroups:
  - name: Users
    tags:
      - Session
      - Users Profile
      - Users Stats
      - Users Management
  - name: Organizations
    tags:
      - Organizations Management
      - Organization Roles
      - Organization Members
      - Organization Invitations
  - name: Projects
    tags:
      - Project Management
      - Project Configuration
      - Project Roles
      - Project Members
      - Project Invitations
      - Project Custom Fields
  - name: Work Items
    tags:
      - Work Item Configuration
      - Work Item Management
      - Work Item Time Tracking
      - Work Item Attachments
      - Work Item Comments
  - name: Agents
    tags:
      - Agent Configuration
      - Agents Management
  - name: Chat
    tags:
      - Chat Management
      - Chat Messaging
  - name: Notifications
    tags:
      - Notifications
      - Approvals

tags:
  - name: Session
    description: Endpoints related to user authentication and session management.
  - name: Users Profile
    description: Endpoints for managing user profiles, including profile updates and image uploads.
  - name: Users Stats
    description: Endpoints for retrieving user performance metrics and skill statistics.
  - name: Users Management
    description: Endpoints for managing users in the system, including listing and searching users
  - name: Organizations Management
    description: Endpoints for managing organizations, including creation, updates and deletes
  - name: Organization Roles
    description: Management of RBAC (Role-Based Access Control) permissions and custom roles.
  - name: Organization Members
    description: Management of active organization members and role distribution.
  - name: Organization Invitations
    description: Handling of user invitations to join the organization.
  - name: Project Management
    description: Endpoints for managing projects, including creation, updates and deletes.
  - name: Project Configuration
    description: Endpoints for managing project configuration settings.
  - name: Project Roles
    description: Management of RBAC (Role-Based Access Control) permissions and custom roles within projects.
  - name: Project Members
    description: Management of active human users and AI agents within a project.
  - name: Project Invitations
    description: Handling of invitations for human users to join a project.
  - name: Project Custom Fields
    description: Engine for creating dynamic, data-driven custom properties for work items.
  - name: Work Item Configuration
    description: Static configurations and dictionaries for work items.
  - name: Work Item Management
    description: Core CRUD operations for managing tasks, bugs, and other work items.
  - name: Work Item Time Tracking
    description: Endpoints for logging and managing time entries against work items.
  - name: Work Item Attachments
    description: Upload and management of physical files via multipart/form-data.
  - name: Work Item Comments
    description: Discussion threads with support for mentions and attachment linking.
  - name: Agent Configuration
    description: Access to system-wide predefined AI agent templates.
  - name: Agents Management
    description: Creation, configuration, and lifecycle management of AI agents.
  - name: Chat Management
    description: Core operations for listing active conversations and polling for new incoming messages globally.
  - name: Chat Messaging
    description: Operations within a specific conversation thread, including fetching history and sending messages to humans or agents.
  - name: Notifications
    description: Global feed of events, mentions, and updates relevant to the user.
  - name: Approvals
    description: Actionable workflow requests awaiting the user's explicit approval or rejection.

paths:
  # ==========================================
  # USERS MODULE
  # ==========================================
  # --- Session & Authentication ---
  /session/oauth/google:
    $ref: './modules/session/paths/session.yaml#/paths/~1oauth~1google'
  /session/refresh:
    $ref: './modules/session/paths/session.yaml#/paths/~1refresh'
  /session/logout:
    $ref: './modules/session/paths/session.yaml#/paths/~1logout'

  # --- User Profile & Stats ---
  /users/me/profile:
    $ref: './modules/users/paths/profile.yaml#/paths/~1me~1profile'
  /users/me/profile/image:
    $ref: './modules/users/paths/profile.yaml#/paths/~1me~1profile~1image'
  /users/me/stats:
    $ref: './modules/users/paths/stats.yaml#/paths/~1me~1stats'

  # --- Users Management ---
  /users:
    $ref: './modules/users/paths/collection.yaml#/paths/~1'

  # ==========================================
  # ORGANIZATIONS MODULE
  # ==========================================
  # --- Organization Management ---
  /organizations/me:
    $ref: './modules/organizations/paths/me.yaml#/paths/~1me'
  /organizations:
    $ref: './modules/organizations/paths/general.yaml#/paths/~1'
  /organizations/{id}:
    $ref: './modules/organizations/paths/general.yaml#/paths/~1{id}'

  # --- Organization Roles & Permissions ---
  /organizations/{orgId}/permissions:
    $ref: './modules/organizations/paths/permissions.yaml#/paths/~1{orgId}~1permissions'
  /organizations/{orgId}/roles:
    $ref: './modules/organizations/paths/roles.yaml#/paths/~1{orgId}~1roles'
  /organizations/{orgId}/roles/{roleId}:
    $ref: './modules/organizations/paths/roles.yaml#/paths/~1{orgId}~1roles~1{roleId}'

  # --- Organization Members ---
  /organizations/{orgId}/members/distribution:
    $ref: './modules/organizations/paths/members.yaml#/paths/~1{orgId}~1members~1distribution'
  /organizations/{orgId}/members:
    $ref: './modules/organizations/paths/members.yaml#/paths/~1{orgId}~1members'
  /organizations/{orgId}/members/{memberId}:
    $ref: './modules/organizations/paths/members.yaml#/paths/~1{orgId}~1members~1{memberId}'

  # --- Organization Invitations ---
  /organizations/{orgId}/invitations:
    $ref: './modules/organizations/paths/invitations.yaml#/paths/~1{orgId}~1invitations'
  /organizations/{orgId}/invitations/{invitationId}:
    $ref: './modules/organizations/paths/invitations.yaml#/paths/~1{orgId}~1invitations~1{invitationId}'

  # ==========================================
  # PROJECTS MODULE
  # ==========================================
  # --- Project Configurations & Collections ---
  /projects/privacy-levels:
    $ref: './modules/projects/paths/configuration.yaml#/paths/~1privacy-levels'
  /projects/field-types:
    $ref: './modules/projects/paths/configuration.yaml#/paths/~1field-types'
  /projects/me:
    $ref: './modules/projects/paths/collections.yaml#/paths/~1me'
  /projects/organization/{orgId}:
    $ref: './modules/projects/paths/collections.yaml#/paths/~1organization~1{orgId}'

  # --- Project Management  ---
  /projects:
    $ref: './modules/projects/paths/projects.yaml#/paths/~1'
  /projects/{projectId}:
    $ref: './modules/projects/paths/projects.yaml#/paths/~1{projectId}'

  # --- Project Roles & Permissions ---
  /projects/{projectId}/permissions:
    $ref: './modules/projects/paths/permissions.yaml#/paths/~1{projectId}~1permissions'
  /projects/{projectId}/roles:
    $ref: './modules/projects/paths/roles.yaml#/paths/~1{projectId}~1roles'
  /projects/{projectId}/roles/{roleId}:
    $ref: './modules/projects/paths/roles.yaml#/paths/~1{projectId}~1roles~1{roleId}'

  # --- Project Members ---
  /projects/{projectId}/members/count:
    $ref: './modules/projects/paths/members.yaml#/paths/~1{projectId}~1members~1count'
  /projects/{projectId}/members:
    $ref: './modules/projects/paths/members.yaml#/paths/~1{projectId}~1members'
  /projects/{projectId}/members/{memberId}:
    $ref: './modules/projects/paths/members.yaml#/paths/~1{projectId}~1members~1{memberId}'

  # --- Project Invitations ---
  /projects/{projectId}/invitations:
    $ref: './modules/projects/paths/invitations.yaml#/paths/~1{projectId}~1invitations'
  /projects/{projectId}/invitations/{invitationId}:
    $ref: './modules/projects/paths/invitations.yaml#/paths/~1{projectId}~1invitations~1{invitationId}'

  # --- Project Custom Fields ---
  /projects/{projectId}/custom-fields:
    $ref: './modules/projects/paths/custom-fields.yaml#/paths/~1{projectId}~1custom-fields'
  /projects/{projectId}/custom-fields/{fieldId}:
    $ref: './modules/projects/paths/custom-fields.yaml#/paths/~1{projectId}~1custom-fields~1{fieldId}'

  # ==========================================
  # WORK ITEMS MODULE
  # ==========================================
  # --- Configurations ---
  /work-items/types:
    $ref: './modules/workitems/paths/configuration.yaml#/paths/~1types'
  /work-items/statuses:
    $ref: './modules/workitems/paths/configuration.yaml#/paths/~1statuses'

  # --- Collections & Items ---
  /projects/{projectId}/work-items:
    $ref: './modules/workitems/paths/collection.yaml#/paths/~1{projectId}~1work-items'
  /projects/{projectId}/work-items/{itemId}:
    $ref: './modules/workitems/paths/item.yaml#/paths/~1{projectId}~1work-items~1{itemId}'

  # --- Time Tracking ---
  /projects/{projectId}/work-items/{itemId}/work-logs:
    $ref: './modules/workitems/paths/work-logs.yaml#/paths/~1{projectId}~1work-items~1{itemId}~1work-logs'
  /projects/{projectId}/work-items/{itemId}/work-logs/{logId}:
    $ref: './modules/workitems/paths/work-logs.yaml#/paths/~1{projectId}~1work-items~1{itemId}~1work-logs~1{logId}'
  # --- Attachments & Comments ---
  /projects/{projectId}/work-items/{itemId}/attachments:
    $ref: './modules/workitems/paths/attachments.yaml#/paths/~1{projectId}~1work-items~1{itemId}~1attachments'
  /projects/{projectId}/work-items/{itemId}/attachments/{attachmentId}:
    $ref: './modules/workitems/paths/attachments.yaml#/paths/~1{projectId}~1work-items~1{itemId}~1attachments~1{attachmentId}'

  /projects/{projectId}/work-items/{itemId}/comments:
    $ref: './modules/workitems/paths/comments.yaml#/paths/~1{projectId}~1work-items~1{itemId}~1comments'
  /projects/{projectId}/work-items/{itemId}/comments/{commentId}:
    $ref: './modules/workitems/paths/comments.yaml#/paths/~1{projectId}~1work-items~1{itemId}~1comments~1{commentId}'

  # ==========================================
  # AGENTS MODULE
  # ==========================================
  # --- Configuration ---
  /agents/templates:
    $ref: './modules/agents/paths/templates.yaml#/paths/~1templates'

  # --- Agent Lifecycle ---
  /agents:
    $ref: './modules/agents/paths/agents.yaml#/paths/~1'
  /agents/{agentId}:
    $ref: './modules/agents/paths/agents.yaml#/paths/~1{agentId}'

  # ==========================================
  # CHATS MODULE
  # ==========================================
  # --- General & Polling ---
  /chats:
    $ref: './modules/chats/paths/general.yaml#/paths/~1'
  /chats/polling:
    $ref: './modules/chats/paths/general.yaml#/paths/~1polling'

  # --- Chat Actions ---
  /chats/{chatId}/messages:
    $ref: './modules/chats/paths/messages.yaml#/paths/~1{chatId}~1messages'

  # ==========================================
  # NOTIFICATIONS & APPROVALS
  # ==========================================
  # --- Notifications ---
  /notifications:
    $ref: './modules/notifications/paths/notifications.yaml#/paths/~1'
  /notifications/{notificationId}/read:
    $ref: './modules/notifications/paths/notifications.yaml#/paths/~1{notificationId}~1read'

  # --- Approvals ---
  /approvals:
    $ref: './modules/notifications/paths/approvals.yaml#/paths/~1'
  /approvals/{approvalId}:
    $ref: './modules/notifications/paths/approvals.yaml#/paths/~1{approvalId}'
  /approvals/{approvalId}/comments:
    $ref: './modules/notifications/paths/approvals.yaml#/paths/~1{approvalId}~1comments'

components:
  securitySchemes:
    BearerAuth:
      $ref: './shared/security/BearerAuth.yaml'
