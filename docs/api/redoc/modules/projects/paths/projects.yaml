paths:
  /:
    post:
      summary: Create Project
      description: Creates a new project. Can be assigned to an organization or kept as a personal user project.
      tags:
        - Project Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/CreateProjectRequest.yaml'
      responses:
        '201':
          description: Project created successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/ProjectResponse.yaml'
        '400':
          description: Bad Request. Validation failed.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. User lacks permission to create projects in the specified organization.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

  /{projectId}:
    parameters:
      - name: projectId
        in: path
        required: true
        description: The UUID of the project.
        schema:
          type: string
          format: uuid
    get:
      summary: Get Project Details
      description: Retrieves the general information of a specific project.
      tags:
        - Project Management
      responses:
        '200':
          description: Project details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/ProjectResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. User does not have access to this project.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
    patch:
      summary: Update Project
      description: Updates the general settings of the project.
      tags:
        - Project Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/UpdateProjectRequest.yaml'
      responses:
        '200':
          description: Project updated successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/ProjectResponse.yaml'
        '400':
          description: Bad Request. Validation failed.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions to update this project.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
    delete:
      summary: Delete Project
      description: Permanently deletes the project and all associated tasks/resources.
      tags:
        - Project Management
      responses:
        '204':
          description: Project successfully deleted. No content returned.
          headers:
            X-Resource-ID:
              description: The UUID of the deleted resource.
              schema:
                type: string
                format: uuid
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions to delete this project.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
