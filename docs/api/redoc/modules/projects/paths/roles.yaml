paths:
  /{projectId}/roles:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List Project Roles
      description: Retrieves all custom and default roles within the project.
      tags:
        - Project Roles
      responses:
        '200':
          description: Successfully retrieved project roles.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/ProjectRoleListResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
    post:
      summary: Create Project Role
      description: Creates a new custom role with specific permissions for the project.
      tags:
        - Project Roles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/CreateProjectRoleRequest.yaml'
      responses:
        '201':
          description: Role created successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/ProjectRoleResponse.yaml'
        '400':
          description: Bad Request. Validation failed.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

  /{projectId}/roles/{roleId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: roleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Update Project Role
      description: Updates the name or permissions of an existing project role.
      tags:
        - Project Roles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/UpdateProjectRoleRequest.yaml'
      responses:
        '200':
          description: Role updated successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/ProjectRoleResponse.yaml'
        '400':
          description: Bad Request. Validation failed.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Role not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
    delete:
      summary: Delete Project Role
      description: Deletes a project role. Fails if the role currently has members assigned.
      tags:
        - Project Roles
      responses:
        '204':
          description: Role successfully deleted.
          headers:
            X-Resource-ID:
              description: The UUID of the deleted role.
              schema:
                type: string
                format: uuid
        '400':
          description: Bad Request. Cannot delete a role that is assigned to active members.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Role not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
