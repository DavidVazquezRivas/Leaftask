paths:
  /types:
    get:
      summary: List Work Item Types
      description: Retrieves the static list of system work item types (e.g., Task, Bug, Epic).
      tags:
        - Work Item Configuration
      responses:
        '200':
          description: Successfully retrieved types.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/WorkItemTypeListResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

  /statuses:
    get:
      summary: List Work Item Statuses
      description: Retrieves the static list of default work item statuses (e.g., To Do, In Progress, Done).
      tags:
        - Work Item Configuration
      responses:
        '200':
          description: Successfully retrieved statuses.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/WorkItemStatusListResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
