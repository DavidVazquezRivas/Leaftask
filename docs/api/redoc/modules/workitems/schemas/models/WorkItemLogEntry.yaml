type: object
properties:
  timestamp:
    type: string
    format: date-time
    example: '2024-07-01T09:00:00Z'
  user:
    $ref: './WorkItemAssignee.yaml'
  fieldName:
    type: string
    example: 'status'
  oldValue:
    $ref: './WorkItemLogValue.yaml'
  newValue:
    $ref: './WorkItemLogValue.yaml'
required:
  - timestamp
  - user
  - fieldName
  - oldValue
  - newValue
