paths:
  /:
    get:
      summary: List My Approvals
      description: Retrieves a paginated list of approval requests assigned to the authenticated user.
      tags:
        - Approvals
      parameters:
        - $ref: '../../../shared/parameters/LimitParam.yaml'
        - $ref: '../../../shared/parameters/CursorParam.yaml'
      responses:
        '200':
          description: Successfully retrieved approval requests.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/ApprovalListResponse.yaml'
        '401':
          description: Unauthorized. Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

  /{approvalId}:
    parameters:
      - name: approvalId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Update Approval Status
      description: Approves or rejects a pending request.
      tags:
        - Approvals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/UpdateApprovalStatusRequest.yaml'
      responses:
        '200':
          description: Approval status updated successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/ApprovalResponse.yaml'
        '400':
          description: Bad Request. Validation failed.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized. Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Approval request not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

  /{approvalId}/comments:
    parameters:
      - name: approvalId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Add Approval Comment
      description: Adds a discussion comment to an approval request without changing its status.
      tags:
        - Approvals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/CreateApprovalCommentRequest.yaml'
      responses:
        '201':
          description: Comment added successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/ApprovalCommentResponse.yaml'
        '400':
          description: Bad Request. Missing content.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized. Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Approval request not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
