type: object
properties:
  id:
    type: string
    format: uuid
    description: The UUID of the User.
    example: '123e4567-e89b-12d3-a456-426614174000'
  name:
    type: string
    description: The user's full name.
    example: 'John Doe'
  email:
    type: string
    format: email
    example: 'john.doe@example.com'
  role:
    type: string
    format: uuid
    description: The UUID of the Role assigned to this member.
    example: '123e4567-e89b-12d3-a456-426614174000'
required:
  - id
  - name
  - email
  - role
