type: object
properties:
  id:
    type: string
    format: uuid
    example: 'a1b2c3d4-e5f6-4a5b-8c7d-9e0f1a2b3c4d'
  name:
    type: string
    example: 'Configure Organization'
  description:
    type: string
    example: 'Modify organization settings, including name, description, and website.'
required:
  - id
  - name
  - description
