paths:
  /{orgId}/members/distribution:
    parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get Role Distribution
      description: Returns a count of members assigned to each role within the organization.
      tags:
        - Organization Members
      responses:
        '200':
          description: Successfully retrieved role distribution.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/RoleDistributionListResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

  /{orgId}/members:
    parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List Organization Members
      description: Retrieves a paginated list of all active members in the organization.
      tags:
        - Organization Members
      parameters:
        - $ref: '../../../shared/parameters/LimitParam.yaml'
        - $ref: '../../../shared/parameters/CursorParam.yaml'
        - $ref: '../../../shared/parameters/SortParam.yaml'
      responses:
        '200':
          description: Successfully retrieved members list.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/OrganizationMemberListResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

  /{orgId}/members/{memberId}:
    parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: memberId
        in: path
        required: true
        description: The UUID of the member.
        schema:
          type: string
          format: uuid
    patch:
      summary: Update Member Role
      description: Changes the role assigned to a specific member.
      tags:
        - Organization Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/UpdateMemberRoleRequest.yaml'
      responses:
        '200':
          description: Member role updated successfully.
        '400':
          description: Bad Request. Validation failed.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions to change roles.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Member not found in this organization.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
    delete:
      summary: Remove Member
      description: Removes a member from the organization.
      tags:
        - Organization Members
      responses:
        '204':
          description: Member successfully removed.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions to remove members.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Member not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
