paths:
  /:
    post:
      summary: Create Organization
      description: Creates a new organization and assigns the current user as the Owner.
      tags:
        - Organizations Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/CreateOrganizationRequest.yaml'
      responses:
        '201':
          description: Organization created successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/OrganizationResponse.yaml'
        '400':
          description: Bad Request. Validation failed.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

  /{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: The UUID of the organization.
        schema:
          type: string
          format: uuid
    get:
      summary: Get Organization Details
      description: Retrieves the general settings and statistics of a specific organization.
      tags:
        - Organizations Management
      responses:
        '200':
          description: Organization details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/OrganizationResponse.yaml'
        '403':
          description: Forbidden. User does not have access to this organization.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Organization not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

    patch:
      summary: Update Organization
      description: Updates general information of the organization. Requires admin privileges.
      tags:
        - Organizations Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/UpdateOrganizationRequest.yaml'
      responses:
        '200':
          description: Organization updated successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/OrganizationResponse.yaml'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Organization not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

    delete:
      summary: Delete Organization
      description: Permanently deletes the organization and all associated data. Requires Owner privileges.
      tags:
        - Organizations Management
      responses:
        '204':
          description: Organization successfully deleted. No content returned.
        '403':
          description: Forbidden. Only the owner can delete the organization.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Organization not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
