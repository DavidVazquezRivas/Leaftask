paths:
  /{orgId}/invitations:
    parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Create Invitation
      description: Invites a user to join the organization with a specific role.
      tags:
        - Organization Invitations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/CreateInvitationRequest.yaml'
      responses:
        '201':
          description: Invitation sent successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/InvitationResponse.yaml'
        '400':
          description: Bad Request. User is already a member or already has a pending invite.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions to invite users.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'

  /{orgId}/invitations/{invitationId}:
    parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: invitationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Respond to Invitation
      description: Accepts or rejects a pending invitation to join the organization.
      tags:
        - Organization Invitations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/requests/RespondInvitationRequest.yaml'
      responses:
        '200':
          description: Invitation successfully processed.
          content:
            application/json:
              schema:
                $ref: '../schemas/responses/InvitationResponse.yaml'
        '400':
          description: Bad Request. Invalid action or invitation already processed.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '403':
          description: Forbidden. Insufficient permissions to respond to the invitation.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '404':
          description: Invitation not found.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '409':
          description: Conflict. Invitation already accepted or rejected.
          content:
            application/json:
              schema:
                $ref: '../../../shared/schemas/GlobalErrorResponse.yaml'
        '500':
          $ref: '../../../shared/responses/InternalServerError.yaml'
